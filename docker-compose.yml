version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./rag:/app/rag
      - ./api:/app/api
      - ./tests:/app/tests

  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: >
      bash -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
