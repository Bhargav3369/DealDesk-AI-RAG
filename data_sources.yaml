project: DealDesk AI
description: Public developer-platform sources for a RAG sales/support copilot.
notes:
  - Use public pages only.
  - Respect robots.txt and site terms.
  - Start with 80-150 pages total, then scale after the RAG pipeline works.
  - Store source_url, vendor, category, and fetched_at with every document.

sources:
  - vendor: Supabase
    domain: supabase.com
    seed_urls:
      - https://supabase.com/docs
      - https://supabase.com/pricing
      - https://supabase.com/docs/guides/auth
      - https://supabase.com/docs/guides/database
      - https://supabase.com/docs/guides/storage
      - https://supabase.com/docs/guides/realtime
      - https://supabase.com/docs/guides/functions
      - https://supabase.com/docs/guides/ai
    allow_prefixes:
      - https://supabase.com/docs
      - https://supabase.com/pricing
    categories:
      - product_docs
      - pricing
      - auth
      - database
      - storage
      - realtime
      - ai_vectors

